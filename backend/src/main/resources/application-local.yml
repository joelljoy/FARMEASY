# ============================================================
# LOCAL DEVELOPMENT PROFILE
# Activated by: SPRING_PROFILES_ACTIVE=local (default)
# Database: Standard MySQL on localhost:3306
#
# The Cloud SQL EnvironmentPostProcessor is disabled globally
# in application.yml via spring.cloud.gcp.sql.enabled=false
# because it fires before profile files are loaded. This file
# only configures the JDBC datasource for the local environment.
# ============================================================
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/farmeasy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FarmEasy-Local-Pool

logging:
  level:
    root: INFO
    com.frameasy: DEBUG
    org.springframework.security: DEBUG
    org.springframework: DEBUG
    com.zaxxer.hikari: DEBUG
