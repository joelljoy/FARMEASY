spring:
  application:
    name: frameasy-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    gcp:
      sql:
        enabled: ${SPRING_CLOUD_GCP_SQL_ENABLED:false}

  # ✅ H2 DATABASE CONFIG (FIXED)
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: krushi.app25@gmail.com
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT config
jwt:
  secret: ${JWT_SECRET:FrameasySuperSecretKeyForJWTTokenGeneration2024Production}
  expiration-ms: 86400000

# API config
schemes:
  api-url: https://api.data.gov.in/resource
  cache-duration-hours: 24

# File upload
upload:
  dir: ./uploads
  equipment: equipment
  land: land
  trade: trade

# Server config
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# Logging
logging:
  level:
    root: WARN
    com.frameasy: DEBUG
    org.springframework.security: INFO
    org.springframework: DEBUG